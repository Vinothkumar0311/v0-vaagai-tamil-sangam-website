<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>வாகை தமிழ்ச்சங்கம்</title>
    <script>
      // GitHub Pages doesn't support SPA routing — any direct URL access or
      // page refresh on a sub-path (e.g. /mandram/mazhalai) will 404.
      // This script reads the URL, stores the path, and redirects to index.html.
      // The index.html then reads the stored path and navigates correctly.
      var path = window.location.pathname;
      // Preserve query string and hash
      var search = window.location.search;
      var hash = window.location.hash;
      // Redirect: encode the path as a query param so index.html can restore it
      window.location.replace(
        window.location.origin +
        '/?p=' + encodeURIComponent(path + search) +
        (hash ? '&h=' + encodeURIComponent(hash) : '')
      );
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
